# ==========================================
# GeneBridge Backend - Application Properties
# ==========================================

# Server
server.port=8080
spring.application.name=genebridge-backend

# ==========================================
# Actuator
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=GeneBridge
info.app.description=Real-time LOC-to-Gene Annotation System for Non-Model Organisms
info.app.version=1.0.0

# ==========================================
# Cache
# ==========================================
spring.cache.type=simple

# ==========================================
# REST Client / HTTP Timeouts
# ==========================================
spring.mvc.async.request-timeout=30000

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.com.genebridge=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# External API Keys (replace with real values)
# ==========================================
# NCBI E-Utilities API key - get one free at: https://www.ncbi.nlm.nih.gov/account/
# Without a key, NCBI rate-limits requests to 3/sec; with a key the limit is 10/sec.
ncbi.api.key=YOUR_NCBI_API_KEY_HERE

# ==========================================
# Jackson JSON serialization
# ==========================================
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
